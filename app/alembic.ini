# Alembic configuration file
# https://alembic.sqlalchemy.org/

[alembic]
# Path to migration scripts
script_location = alembic
prepend_sys_path = .

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Truncate slug to this many characters
truncate_slug_length = 40

# SQLAlchemy URL — overridden dynamically by alembic/env.py from settings
# Do NOT set sqlalchemy.url here; env.py reads DATABASE_URL from environment
sqlalchemy.url =

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
